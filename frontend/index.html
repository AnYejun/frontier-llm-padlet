<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontier LLM 세션 보드</title>
    <meta name="description" content="Frontier LLM 스터디 세션별 주차 진행 및 소통 보드">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #161620;
            --bg-card-hover: #1e1e2a;
            --bg-input: #0d0d14;
            --accent-1: #39ff14;
            --accent-2: #2bc40e;
            --accent-3: #1a2a1a;
            --accent-gradient: linear-gradient(135deg, #39ff14, #00e676);
            --text-primary: #e8eae8;
            --text-secondary: #9a9ca0;
            --text-muted: #5a5c60;
            --border: rgba(255, 255, 255, 0.05);
            --glass: rgba(57, 255, 20, 0.03);
            --glass-border: rgba(57, 255, 20, 0.12);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-hover: 0 12px 40px rgba(57, 255, 20, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(57, 255, 20, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 230, 118, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(20, 20, 30, 0.2) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 20s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {

            0%,
            100% {
                opacity: 0.8;
            }

            50% {
                opacity: 1;
            }
        }

        /* ──── Header ──── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.94);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 32px;
        }

        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.2);
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 10px;
            font-weight: 600;
            color: var(--accent-1);
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ──── Buttons ──── */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #0a0a0f;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(57, 255, 20, 0.35);
        }

        .btn-ghost {
            background: var(--glass);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
        }

        /* ──── User Switcher ──── */
        .user-switcher {
            position: relative;
        }

        .user-current {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px 6px 6px;
            border-radius: 24px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
        }

        .user-current:hover {
            border-color: var(--accent-1);
            background: rgba(57, 255, 20, 0.06);
        }

        .user-current .u-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: white;
            font-weight: 700;
        }

        .user-dropdown {
            display: none;
            position: absolute;
            top: 46px;
            right: 0;
            z-index: 200;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            min-width: 210px;
            overflow: hidden;
        }

        .user-dropdown.open {
            display: block;
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            text-align: left;
            transition: background 0.15s;
        }

        .user-dropdown-item:hover {
            background: rgba(57, 255, 20, 0.08);
            color: var(--text-primary);
        }

        .user-dropdown-item.active {
            background: rgba(57, 255, 20, 0.12);
            color: var(--accent-1);
            font-weight: 600;
        }

        .user-dropdown-item .ud-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        .user-dropdown-rename {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--accent-1);
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            width: 100%;
            text-align: left;
            transition: background 0.15s;
        }

        .user-dropdown-rename:hover {
            background: rgba(57, 255, 20, 0.06);
        }

        /* ──── Toolbar ──── */
        .toolbar {
            max-width: 1600px;
            margin: 0 auto;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .week-nav {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .week-tab {
            padding: 8px 18px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: var(--glass);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .week-tab:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
        }

        .week-tab.active {
            background: var(--accent-gradient);
            color: #0a0a0f;
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 2px 12px rgba(57, 255, 20, 0.2);
        }

        /* ──── Board ──── */
        .board-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 32px 60px;
            position: relative;
            z-index: 1;
        }

        .week-header {
            margin-bottom: 24px;
        }

        .week-header .meta {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .meta-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }

        /* ──── Editable Week Fields ──── */
        .week-title-editable {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 4px 8px;
            color: var(--text-primary);
            font-size: 24px;
            font-weight: 700;
            font-family: inherit;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            letter-spacing: -0.5px;
        }

        .week-title-editable:hover {
            border-color: var(--glass-border);
        }

        .week-title-editable:focus {
            border-color: var(--accent-1);
            background: var(--bg-primary);
        }

        .week-desc-editable {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 6px 10px;
            margin-top: 4px;
            color: var(--text-secondary);
            font-size: 14px;
            font-family: inherit;
            width: 100%;
            outline: none;
            transition: all 0.2s;
            resize: none;
            line-height: 1.5;
            min-height: 28px;
            cursor: text;
        }

        .week-desc-editable:hover {
            border-color: var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
        }

        .week-desc-editable:focus {
            border-color: var(--accent-1);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.06);
        }

        /* ──── Posts Grid ──── */
        .columns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .section-column h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .col-emoji {
            font-size: 20px;
        }

        /* ──── Post Card ──── */
        .post-card {
            position: relative;
            break-inside: avoid;
            margin-bottom: 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            box-shadow: var(--shadow);
            animation: cardIn 0.4s ease-out both;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(57, 255, 20, 0.2);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
        }

        .post-color-bar {
            height: 4px;
        }

        .post-body {
            padding: 20px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .author-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .author-name {
            font-size: 13px;
            font-weight: 600;
        }

        .author-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .post-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .post-content {
            font-size: 13.5px;
            color: var(--text-secondary);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .post-tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(57, 255, 20, 0.1);
            color: var(--accent-1);
            border: 1px solid rgba(57, 255, 20, 0.15);
        }

        .post-footer {
            padding: 10px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .reactions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .reaction-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .reaction-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: scale(1.05);
        }

        /* ──── Post Delete ──── */
        .post-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 60, 60, 0.15);
            border: 1px solid rgba(255, 60, 60, 0.2);
            color: #ff6b6b;
            cursor: pointer;
            font-size: 13px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: all 0.2s;
            z-index: 5;
        }

        .post-card:hover .post-delete {
            opacity: 1;
        }

        .post-delete:hover {
            background: rgba(255, 60, 60, 0.35);
            color: #ff4444;
            transform: scale(1.1);
        }

        /* ──── Comments ──── */
        .comments-section {
            padding: 0 20px 16px;
        }

        .comment-list {
            list-style: none;
        }

        .comment-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .comment-body {
            flex: 1;
            min-width: 0;
        }

        .comment-author {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .comment-text {
            font-size: 12.5px;
            color: var(--text-secondary);
            line-height: 1.5;
            word-break: break-word;
        }

        .comment-time {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .comment-delete {
            position: absolute;
            top: 10px;
            right: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .comment-item:hover .comment-delete {
            opacity: 1;
        }

        .comment-delete:hover {
            color: var(--accent-1);
            background: rgba(57, 255, 20, 0.08);
        }

        .comment-input-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            align-items: center;
        }

        .comment-my-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .comment-input {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .comment-input:focus {
            border-color: var(--accent-1);
        }

        .comment-send {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: var(--accent-gradient);
            color: #0a0a0f;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s;
        }

        .comment-send:hover {
            transform: scale(1.05);
        }

        /* ──── New Post Card ──── */
        .new-post-card {
            break-inside: avoid;
            margin-bottom: 16px;
            min-height: 100px;
            border: 2px dashed var(--glass-border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .new-post-card:hover {
            border-color: var(--accent-1);
            color: var(--accent-1);
            background: rgba(57, 255, 20, 0.04);
        }

        .plus-icon {
            font-size: 28px;
            font-weight: 300;
        }

        /* ──── Empty State ──── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        /* ──── Modal ──── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            width: 600px;
            max-width: 95vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--accent-1);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.06);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-select {
            cursor: pointer;
        }

        .tag-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 14px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            min-height: 46px;
            cursor: text;
        }

        .tag-input-area:focus-within {
            border-color: var(--accent-1);
            box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.06);
        }

        .tag-input-field {
            flex: 1;
            min-width: 80px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
        }

        .tag-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            background: rgba(57, 255, 20, 0.12);
            color: var(--accent-1);
            border-radius: 14px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-chip button {
            background: none;
            border: none;
            color: var(--accent-1);
            cursor: pointer;
            font-size: 14px;
        }

        .color-picker-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.15);
        }

        .color-option.selected {
            border-color: var(--text-primary);
            transform: scale(1.15);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 10px;
        }

        /* ──── Toast ──── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 12px 28px;
            border-radius: 30px;
            background: var(--accent-gradient);
            color: #0a0a0f;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: 0 6px 30px rgba(57, 255, 20, 0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ──── Loading ──── */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .loading-spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ──── Scrollbar ──── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(57, 255, 20, 0.12);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(57, 255, 20, 0.25);
        }

        @media (max-width: 600px) {
            .header {
                padding: 0 16px;
            }

            .toolbar {
                padding: 12px 16px;
                flex-direction: column;
                gap: 12px;
            }

            .board-container {
                padding: 0 16px 30px;
            }

            .week-nav {
                flex-wrap: wrap;
            }

            .modal {
                max-width: 95vw;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo-section">
                <div class="logo-icon">😊</div>
                <div class="logo-text">
                    <h1 style="font-size:22px">Frontier LLM Let's GO</h1>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-ghost" onclick="openClassSettings()">📚 클래스 관리</button>
                <button class="btn btn-primary" onclick="openNewPost()">✏️ 새 글 작성</button>
                <div class="user-switcher">
                    <button class="user-current" id="userCurrentBtn" onclick="toggleUserDropdown()">
                        <span class="u-avatar" id="userAvatar"></span>
                        <span id="userName"></span> ▾
                    </button>
                    <div class="user-dropdown" id="userDropdown"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <div class="week-nav" id="weekNav"></div>
    </div>

    <div class="board-container">
        <div class="week-header" id="weekHeader"></div>
        <div class="columns-grid" id="columnsGrid" style="display:grid"></div>
    </div>

    <!-- New Post Modal -->
    <div class="modal-overlay" id="newPostModal">
        <div class="modal">
            <div class="modal-header">
                <h3>✏️ 새 글 작성</h3>
                <button class="modal-close" onclick="closeModal('newPostModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>섹션</label>
                    <select class="form-select" id="postSection"></select>
                </div>
                <div class="form-group">
                    <label>제목</label>
                    <input class="form-input" id="postTitle" placeholder="제목을 입력하세요">
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea class="form-textarea" id="postContent" placeholder="자유롭게 의견을 남겨주세요..."></textarea>
                </div>
                <div class="form-group">
                    <label>태그 (Enter로 추가)</label>
                    <div class="tag-input-area" id="tagArea" onclick="document.getElementById('tagInput').focus()">
                        <input class="tag-input-field" id="tagInput" placeholder="태그 입력..."
                            onkeydown="handleTagInput(event)">
                    </div>
                </div>
                <div class="form-group">
                    <label>카드 색상</label>
                    <div class="color-picker-row" id="colorPicker"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-ghost" onclick="closeModal('newPostModal')">취소</button>
                    <button class="btn btn-primary" onclick="submitPost()">게시하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Class Settings Modal -->
    <div class="modal-overlay" id="classSettingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3>📚 클래스 관리</h3>
                <button class="modal-close" onclick="closeModal('classSettingsModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>새 클래스 추가</label>
                    <div style="display:flex;gap:8px;align-items:center">
                        <input class="form-input" id="newClassName" placeholder="예: Week 2 – Scaling Laws"
                            style="flex:1" onkeydown="if(event.key==='Enter')addClass()">
                        <button class="btn btn-primary" onclick="addClass()" style="white-space:nowrap">추가</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>클래스 목록</label>
                    <div id="classListContainer" style="display:flex;flex-direction:column;gap:8px"></div>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-ghost" onclick="closeModal('classSettingsModal')">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal" style="max-width:400px">
            <div class="modal-header">
                <h3>✏️ 이름 변경</h3>
                <button class="modal-close" onclick="closeModal('renameModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>새 이름</label>
                    <input class="form-input" id="renameInput" placeholder="이름을 입력하세요"
                        onkeydown="if(event.key==='Enter')confirmRename()">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-ghost" onclick="closeModal('renameModal')">취소</button>
                    <button class="btn btn-primary" onclick="confirmRename()">변경</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ══════════════════════════════════════════════
        //  CONFIG & STATE
        // ══════════════════════════════════════════════
        const API = '';  // same origin
        const COLORS = ['#39ff14', '#00e676', '#1b5e20', '#2e7d32', '#4caf50', '#81c784', '#00c853', '#1a1a2e'];
        let members = [];
        let weeks = [];
        let currentWeekIdx = 0;
        let currentMemberId = parseInt(localStorage.getItem('frontier_member_id') || '0');
        let currentTags = [];
        let selectedColor = COLORS[0];

        // ══════════════════════════════════════════════
        //  API HELPERS
        // ══════════════════════════════════════════════
        async function api(method, path, body) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(API + path, opts);
            if (!r.ok) {
                const err = await r.json().catch(() => ({}));
                throw new Error(err.detail || 'API error');
            }
            return r.json();
        }

        // ══════════════════════════════════════════════
        //  DATA LOADING
        // ══════════════════════════════════════════════
        async function loadData() {
            try {
                [members, weeks] = await Promise.all([
                    api('GET', '/api/members'),
                    api('GET', '/api/weeks')
                ]);
                if (currentWeekIdx >= weeks.length) currentWeekIdx = 0;
                renderAll();
            } catch (e) {
                console.error('Failed to load data:', e);
                document.getElementById('masonryGrid').innerHTML =
                    '<div class="loading"><div class="loading-spinner"></div><p>서버에 연결할 수 없습니다</p></div>';
            }
        }

        function currentWeek() { return weeks[currentWeekIdx]; }
        function getCurrentMember() { return members.find(m => m.id === currentMemberId) || members[0]; }
        function getMemberColor(name) { var m = members.find(x => x.name === name); return m ? m.color : '#6e6d68'; }
        function getInitial(name) { return name ? name.charAt(0).toUpperCase() : '?'; }

        // ══════════════════════════════════════════════
        //  RENDER
        // ══════════════════════════════════════════════
        function renderAll() {
            renderUserSwitcher();
            renderWeekNav();
            renderWeekHeader();
            renderPosts();
        }

        function renderUserSwitcher() {
            var m = getCurrentMember();
            if (!m) return;
            document.getElementById('userAvatar').style.background = m.color;
            document.getElementById('userAvatar').textContent = getInitial(m.name);
            document.getElementById('userName').textContent = m.name;
            var dd = document.getElementById('userDropdown');
            dd.innerHTML = members.map(function (mem) {
                return '<button class="user-dropdown-item ' + (mem.id === currentMemberId ? 'active' : '') + '" onclick="loginAs(' + mem.id + ')">' +
                    '<div class="ud-avatar" style="background:' + mem.color + '">' + getInitial(mem.name) + '</div>' +
                    escapeHtml(mem.name) +
                    '</button>';
            }).join('') +
                '<div class="user-dropdown-divider"></div>' +
                '<button class="user-dropdown-rename" onclick="renameMember()">✏️ 내 이름 변경</button>';
        }

        function toggleUserDropdown() {
            document.getElementById('userDropdown').classList.toggle('open');
        }

        function loginAs(id) {
            currentMemberId = id;
            localStorage.setItem('frontier_member_id', id);
            document.getElementById('userDropdown').classList.remove('open');
            renderAll();
            showToast(getCurrentMember().name + '(으)로 로그인했습니다 👋');
        }

        async function renameMember() {
            document.getElementById('userDropdown').classList.remove('open');
            var m = getCurrentMember();
            document.getElementById('renameInput').value = m.name;
            openModal('renameModal');
            setTimeout(function () { document.getElementById('renameInput').focus(); document.getElementById('renameInput').select(); }, 300);
        }

        async function confirmRename() {
            var newName = document.getElementById('renameInput').value.trim();
            var m = getCurrentMember();
            if (!newName || newName === m.name) { closeModal('renameModal'); return; }
            try {
                await api('PUT', '/api/members/' + m.id, { name: newName });
                closeModal('renameModal');
                await loadData();
                showToast('이름이 "' + newName + '"으로 변경되었습니다 ✨');
            } catch (e) { showToast('오류: ' + e.message); }
        }

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.user-switcher')) {
                var dd = document.getElementById('userDropdown');
                if (dd) dd.classList.remove('open');
            }
        });

        function renderWeekNav() {
            var nav = document.getElementById('weekNav');
            nav.innerHTML = weeks.map(function (w, i) {
                return '<button class="week-tab ' + (i === currentWeekIdx ? 'active' : '') + '" onclick="switchWeek(' + i + ')">' +
                    escapeHtml(w.title.split('–')[0].trim()) + '</button>';
            }).join('');
        }

        function renderWeekHeader() {
            var w = currentWeek();
            if (!w) return;
            var postCount = w.posts.length;
            var commentCount = w.posts.reduce(function (s, p) { return s + (p.comments ? p.comments.length : 0); }, 0);
            var authors = {};
            w.posts.forEach(function (p) { authors[p.author] = true; });
            var uniqueAuthors = Object.keys(authors).length;

            document.getElementById('weekHeader').innerHTML =
                '<input class="week-title-editable" value="' + escapeAttr(w.title) + '" onchange="updateWeekTitle(this.value)" placeholder="주차 제목을 입력하세요">' +
                '<textarea class="week-desc-editable" onchange="updateWeekDesc(this.value)" placeholder="학습 목표를 입력하세요... (클릭하여 수정)">' + escapeHtml(w.description) + '</textarea>' +
                '<div class="meta">' +
                '<span class="meta-badge">📝 ' + postCount + '개 게시글</span>' +
                '<span class="meta-badge">💬 ' + commentCount + '개 댓글</span>' +
                '<span class="meta-badge">👤 ' + uniqueAuthors + '명 참여</span>' +
                '</div>';
            var ta = document.querySelector('.week-desc-editable');
            if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
        }

        function renderPostCard(post, idx) {
            var me = getCurrentMember();
            var avatarCol = getMemberColor(post.author);
            var reactionHtml = '';
            if (post.reactions) {
                Object.keys(post.reactions).forEach(function (emoji) {
                    reactionHtml += '<button class="reaction-btn" onclick="addReaction(' + post.id + ',\'' + emoji + '\')">' + emoji + ' ' + post.reactions[emoji] + '</button>';
                });
            }
            var commentsCount = post.comments ? post.comments.length : 0;
            var commentsHtml = '';
            if (post.comments) {
                post.comments.forEach(function (c) {
                    commentsHtml +=
                        '<li class="comment-item">' +
                        '<div class="comment-avatar" style="background:' + getMemberColor(c.author) + '">' + getInitial(c.author) + '</div>' +
                        '<div class="comment-body">' +
                        '<div class="comment-author">' + escapeHtml(c.author) + '</div>' +
                        '<div class="comment-text">' + escapeHtml(c.text) + '</div>' +
                        '<div class="comment-time">' + formatTime(c.created_at) + '</div>' +
                        '</div>' +
                        '<button class="comment-delete" onclick="deleteComment(' + c.id + ')" title="삭제">✕</button>' +
                        '</li>';
                });
            }
            var tagsHtml = '';
            if (post.tags) {
                post.tags.forEach(function (t) { tagsHtml += '<span class="post-tag">' + escapeHtml(t) + '</span>'; });
            }

            return '<div class="post-card" style="animation-delay:' + (idx * 0.05) + 's">' +
                '<button class="post-delete" onclick="event.stopPropagation();deletePost(' + post.id + ')" title="삭제">✕</button>' +
                '<div class="post-color-bar" style="background:' + (post.color || '#39ff14') + '"></div>' +
                '<div class="post-body">' +
                '<div class="post-author">' +
                '<div class="author-avatar" style="background:' + avatarCol + '">' + getInitial(post.author) + '</div>' +
                '<div>' +
                '<div class="author-name">' + escapeHtml(post.author) + '</div>' +
                '<div class="author-time">' + formatTime(post.created_at) + '</div>' +
                '</div>' +
                '</div>' +
                (post.title ? '<div class="post-title">' + escapeHtml(post.title) + '</div>' : '') +
                '<div class="post-content">' + linkify(escapeHtml(post.content)) + '</div>' +
                (tagsHtml ? '<div class="post-tags">' + tagsHtml + '</div>' : '') +
                '</div>' +
                '<div class="post-footer">' +
                '<div class="reactions">' + reactionHtml +
                '<button class="reaction-btn" onclick="addReactionPicker(' + post.id + ')">+</button>' +
                '</div>' +
                '<span style="font-size:12px;color:var(--text-muted)">💬 ' + commentsCount + '</span>' +
                '</div>' +
                '<div class="comments-section">' +
                '<ul class="comment-list">' + commentsHtml + '</ul>' +
                '<div class="comment-input-row">' +
                '<div class="comment-my-avatar" style="background:' + (me ? me.color : '#666') + '">' + getInitial(me ? me.name : '') + '</div>' +
                '<input class="comment-input" id="commentInput-' + post.id + '" placeholder="댓글 작성..." onkeydown="if(event.key===\'Enter\')addComment(' + post.id + ')">' +
                '<button class="comment-send" onclick="addComment(' + post.id + ')">전송</button>' +
                '</div>' +
                '</div>' +
                '</div>';
        }

        function renderPosts() {
            var w = currentWeek();
            if (!w) return;
            var columns = document.getElementById('columnsGrid');
            if (w.posts.length === 0 && w.sections.length === 0) {
                columns.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>아직 게시글이 없습니다</h3><p>첫 번째 게시글을 작성해보세요!</p></div>';
            } else {
                columns.innerHTML = w.sections.map(function (sec) {
                    var sectionPosts = w.posts.filter(function (p) { return p.section === sec; });
                    return '<div class="section-column"><h3><span class="col-emoji">' + sec.split(' ')[0] + '</span>' + sec.split(' ').slice(1).join(' ') + '</h3>' +
                        sectionPosts.map(function (p, i) { return renderPostCard(p, i); }).join('') +
                        '<div class="new-post-card" onclick="openNewPost(\'' + sec.replace(/'/g, "\\'") + '\')" style="min-height:60px;padding:14px"><span style="font-size:18px">+</span></div></div>';
                }).join('');
            }
        }

        // ══════════════════════════════════════════════
        //  INTERACTIONS
        // ══════════════════════════════════════════════
        function switchWeek(idx) {
            currentWeekIdx = idx;
            renderAll();
        }

        function openNewPost(preselectedSection) {
            currentTags = [];
            selectedColor = COLORS[0];
            document.getElementById('postTitle').value = '';
            document.getElementById('postContent').value = '';
            renderTagArea();
            renderColorPicker();
            renderSectionOptions(preselectedSection);
            openModal('newPostModal');
            setTimeout(function () { document.getElementById('postTitle').focus(); }, 300);
        }

        function renderSectionOptions(preselected) {
            var w = currentWeek();
            if (!w) return;
            var sel = document.getElementById('postSection');
            sel.innerHTML = w.sections.map(function (s) {
                return '<option value="' + s + '" ' + (s === preselected ? 'selected' : '') + '>' + s + '</option>';
            }).join('');
        }

        function renderColorPicker() {
            document.getElementById('colorPicker').innerHTML = COLORS.map(function (c) {
                return '<div class="color-option ' + (c === selectedColor ? 'selected' : '') + '" style="background:' + c + '" onclick="selectColor(\'' + c + '\')"></div>';
            }).join('');
        }
        function selectColor(c) { selectedColor = c; renderColorPicker(); }

        function renderTagArea() {
            var area = document.getElementById('tagArea');
            var chips = currentTags.map(function (t, i) {
                return '<span class="tag-chip">' + t + '<button onclick="removeTag(' + i + ')">×</button></span>';
            }).join('');
            area.innerHTML = chips + '<input class="tag-input-field" id="tagInput" placeholder="태그 입력..." onkeydown="handleTagInput(event)">';
        }
        function handleTagInput(e) {
            if (e.key === 'Enter') { e.preventDefault(); var v = e.target.value.trim(); if (v && currentTags.indexOf(v) === -1) { currentTags.push(v); renderTagArea(); } }
        }
        function removeTag(i) { currentTags.splice(i, 1); renderTagArea(); }

        async function submitPost() {
            var title = document.getElementById('postTitle').value.trim();
            var content = document.getElementById('postContent').value.trim();
            var section = document.getElementById('postSection').value;
            if (!content && !title) { showToast('제목이나 내용을 입력하세요'); return; }
            try {
                await api('POST', '/api/posts', {
                    week_id: currentWeek().id,
                    member_id: currentMemberId,
                    section: section, title: title, content: content,
                    tags: currentTags, color: selectedColor
                });
                closeModal('newPostModal');
                await loadData();
                showToast('게시글이 등록되었습니다! 🎉');
            } catch (e) { showToast('오류: ' + e.message); }
        }

        async function addReaction(postId, emoji) {
            try { await api('POST', '/api/posts/' + postId + '/reactions', { emoji: emoji }); await loadData(); }
            catch (e) { showToast('오류: ' + e.message); }
        }
        function addReactionPicker(postId) {
            var emojis = ['👍', '🔥', '💡', '🤔', '❤️', '🎉', '👀', '💯'];
            addReaction(postId, emojis[Math.floor(Math.random() * emojis.length)]);
        }

        async function addComment(postId) {
            var input = document.getElementById('commentInput-' + postId);
            var text = input.value.trim();
            if (!text) return;
            try {
                await api('POST', '/api/posts/' + postId + '/comments', { member_id: currentMemberId, text: text });
                await loadData();
            } catch (e) { showToast('오류: ' + e.message); }
        }

        async function deletePost(postId) {
            if (!confirm('이 게시글을 삭제하시겠습니까?')) return;
            try {
                await api('DELETE', '/api/posts/' + postId);
                await loadData();
                showToast('게시글이 삭제되었습니다 🗑');
            } catch (e) { showToast('오류: ' + e.message); }
        }

        async function deleteComment(commentId) {
            if (!confirm('이 댓글을 삭제하시겠습니까?')) return;
            try {
                await api('DELETE', '/api/comments/' + commentId);
                await loadData();
                showToast('댓글이 삭제되었습니다');
            } catch (e) { showToast('오류: ' + e.message); }
        }

        async function updateWeekTitle(val) {
            var w = currentWeek();
            try { await api('PUT', '/api/weeks/' + w.id, { title: val }); weeks[currentWeekIdx].title = val; renderWeekNav(); }
            catch (e) { showToast('오류: ' + e.message); }
        }

        async function updateWeekDesc(val) {
            var w = currentWeek();
            try { await api('PUT', '/api/weeks/' + w.id, { description: val }); }
            catch (e) { showToast('오류: ' + e.message); }
        }

        // ══════════════════════════════════════════════
        //  CLASS MANAGEMENT
        // ══════════════════════════════════════════════
        function openClassSettings() {
            renderClassList();
            openModal('classSettingsModal');
        }

        function renderClassList() {
            var container = document.getElementById('classListContainer');
            if (weeks.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:13px">클래스가 없습니다. 위에서 추가하세요.</p>';
                return;
            }
            container.innerHTML = weeks.map(function (w, i) {
                return '<div style="display:flex;align-items:center;gap:8px;padding:12px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--glass-border)">' +
                    '<div style="flex:1;min-width:0">' +
                    '<div style="font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:4px;cursor:pointer" ' +
                    'onclick="editClassTitle(' + w.id + ',this)" title="클릭하여 제목 수정">' + escapeHtml(w.title) + '</div>' +
                    '<div style="font-size:12px;color:var(--text-secondary);cursor:pointer" ' +
                    'onclick="editClassDesc(' + w.id + ',this)" title="클릭하여 설명 수정">' + (w.description || '설명 없음 (클릭하여 추가)') + '</div>' +
                    '</div>' +
                    '<span style="font-size:11px;color:var(--text-muted);white-space:nowrap">' + w.posts.length + '개 글</span>' +
                    '<button class="btn btn-ghost" style="padding:6px 10px;font-size:12px;color:#ff6b6b;border-color:rgba(255,60,60,0.2)" onclick="deleteClass(' + w.id + ')">🗑</button>' +
                    '</div>';
            }).join('');
        }

        function editClassTitle(weekId, el) {
            var current = el.textContent;
            var input = document.createElement('input');
            input.className = 'form-input';
            input.value = current;
            input.style.padding = '6px 10px';
            input.style.fontSize = '14px';
            el.replaceWith(input);
            input.focus();
            input.select();
            var save = async function () {
                var val = input.value.trim();
                if (val && val !== current) {
                    await api('PUT', '/api/weeks/' + weekId, { title: val });
                    await loadData();
                    showToast('클래스 제목이 변경되었습니다');
                }
                renderClassList();
            };
            input.onblur = save;
            input.onkeydown = function (e) { if (e.key === 'Enter') save(); if (e.key === 'Escape') renderClassList(); };
        }

        function editClassDesc(weekId, el) {
            var current = el.textContent === '설명 없음 (클릭하여 추가)' ? '' : el.textContent;
            var input = document.createElement('input');
            input.className = 'form-input';
            input.value = current;
            input.style.padding = '4px 10px';
            input.style.fontSize = '12px';
            input.placeholder = '설명을 입력하세요...';
            el.replaceWith(input);
            input.focus();
            var save = async function () {
                var val = input.value.trim();
                if (val !== current) {
                    await api('PUT', '/api/weeks/' + weekId, { description: val });
                    await loadData();
                }
                renderClassList();
            };
            input.onblur = save;
            input.onkeydown = function (e) { if (e.key === 'Enter') save(); if (e.key === 'Escape') renderClassList(); };
        }

        async function addClass() {
            var input = document.getElementById('newClassName');
            var title = input.value.trim();
            if (!title) return;
            try {
                await api('POST', '/api/weeks', { title: title });
                input.value = '';
                await loadData();
                renderClassList();
                showToast('새 클래스가 추가되었습니다! 📚');
            } catch (e) { showToast('오류: ' + e.message); }
        }

        async function deleteClass(weekId) {
            var w = weeks.find(function (x) { return x.id === weekId; });
            if (!w) return;
            if (!confirm('"' + w.title + '" 클래스를 삭제하시겠습니까?\n포함된 모든 글과 댓글이 삭제됩니다.')) return;
            try {
                await api('DELETE', '/api/weeks/' + weekId);
                if (currentWeekIdx >= weeks.length - 1) currentWeekIdx = Math.max(0, weeks.length - 2);
                await loadData();
                renderClassList();
                showToast('클래스가 삭제되었습니다');
            } catch (e) { showToast('오류: ' + e.message); }
        }
        // ══════════════════════════════════════════════
        //  UTILITIES
        // ══════════════════════════════════════════════
        function openModal(id) { document.getElementById(id).classList.add('open'); document.body.style.overflow = 'hidden'; }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, 2500); }
        function escapeHtml(str) { if (!str) return ''; var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
        function escapeAttr(str) { return str ? str.replace(/"/g, '&quot;').replace(/</g, '&lt;') : ''; }
        function linkify(text) { return text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent-1);text-decoration:underline">$1</a>'); }
        function formatTime(iso) {
            if (!iso) return '';
            var d = new Date(iso); var now = new Date(); var diff = (now - d) / 1000;
            if (diff < 60) return '방금 전';
            if (diff < 3600) return Math.floor(diff / 60) + '분 전';
            if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
            if (diff < 604800) return Math.floor(diff / 86400) + '일 전';
            return d.toLocaleDateString('ko-KR');
        }

        document.querySelectorAll('.modal-overlay').forEach(function (overlay) {
            overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(overlay.id); });
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') { document.querySelectorAll('.modal-overlay.open').forEach(function (m) { closeModal(m.id); }); }
        });

        // ══════════════════════════════════════════════
        //  INIT
        // ══════════════════════════════════════════════
        loadData();
    </script>
</body>

</html>
